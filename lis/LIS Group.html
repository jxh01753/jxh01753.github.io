<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LIS Group — Environmental Services since 1992</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --paper: #F4F1EC;
    --paper-2: #ECE7DF;
    --ink: #0B1220;
    --ink-2: #1E2536;
    --muted: #6A6F7A;
    --rule: #D8D1C4;
    --primary: #1E5A8C;     /* British petrol blue */
    --primary-deep: #0F3D63;
    --leaf: #4A7C59;        /* moss/leaf green */
    --leaf-deep: #2F5A3E;
    --accent: #C8A24A;      /* brass — for occasional highlights */
    --max: 1400px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01', 'cv11';
    line-height: 1.5;
  }
  ::selection { background: var(--ink); color: var(--paper); }

  .display { font-family: 'Inter Tight', sans-serif; letter-spacing: -0.025em; line-height: 0.95; font-weight: 700; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .container { max-width: var(--max); margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .container { padding: 0 20px; } }

  /* --- Top utility / nav --- */
  .topstrip {
    background: var(--ink);
    color: var(--paper);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .topstrip-inner {
    display: flex; gap: 28px; align-items: center;
    padding: 10px 0; flex-wrap: wrap;
  }
  .topstrip .dot { width: 6px; height: 6px; background: var(--leaf); border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; box-shadow: 0 0 0 4px rgba(74,124,89,0.18); }
  .topstrip a { color: inherit; text-decoration: none; opacity: 0.8; }
  .topstrip a:hover { opacity: 1; }
  .topstrip .spacer { flex: 1; }

  nav.main {
    position: sticky; top: 0; z-index: 50;
    background: rgba(244, 241, 236, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--rule);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 0;
  }
  .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); }
  .brand-mark {
    height: 38px;
    width: auto;
    display: block;
  }
  .brand-name { font-family: 'Inter Tight'; font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

  .navlinks { display: flex; gap: 4px; align-items: center; }
  .navlinks a {
    padding: 10px 14px;
    color: var(--ink-2);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .navlinks a:hover { background: rgba(11, 18, 32, 0.06); color: var(--ink); }
  @media (max-width: 900px) { .navlinks a:not(.cta) { display: none; } }

  .cta {
    background: var(--ink) !important;
    color: var(--paper) !important;
    padding: 12px 18px !important;
    border-radius: 999px !important;
    font-weight: 600 !important;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .cta:hover { background: var(--primary) !important; }
  .cta::after { content: '→'; font-family: 'Inter Tight'; }

  /* --- Hero --- */
  .hero { padding: 60px 0 80px; position: relative; }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 56px;
    align-items: end;
  }
  @media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .eyebrow::before {
    content: ''; width: 32px; height: 1px; background: var(--ink); display: inline-block;
  }

  h1.hero-title {
    font-size: clamp(56px, 8.6vw, 132px);
    margin: 0 0 32px;
  }
  h1.hero-title em {
    font-style: normal;
    color: var(--primary);
    font-family: 'Inter Tight';
    font-weight: 400;
    font-feature-settings: 'ss01';
  }
  h1.hero-title .leaf { color: var(--leaf); font-weight: 400; font-style: italic; }

  .hero-lede {
    font-size: 18px;
    color: var(--ink-2);
    max-width: 56ch;
    margin: 0 0 36px;
    line-height: 1.55;
  }
  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 24px;
    border-radius: 999px;
    font-weight: 600;
    text-decoration: none;
    font-size: 15px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.15s, color 0.15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--primary); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
  .btn-ghost:hover { background: var(--ink); color: var(--paper); }
  .btn .arrow { font-family: 'Inter Tight'; font-size: 16px; }

  /* hero side stats */
  .hero-side {
    border-left: 1px solid var(--rule);
    padding-left: 32px;
    display: flex; flex-direction: column; gap: 28px;
  }
  @media (max-width: 980px) { .hero-side { border-left: none; padding-left: 0; border-top: 1px solid var(--rule); padding-top: 32px; } }

  .stat .num { font-family: 'Inter Tight'; font-weight: 700; font-size: 56px; line-height: 1; letter-spacing: -0.03em; }
  .stat .num span { color: var(--leaf); }
  .stat .lab { font-size: 13px; color: var(--muted); margin-top: 8px; max-width: 28ch; }

  /* hero photo placeholder */
  .hero-photo {
    margin-top: 60px;
    aspect-ratio: 21/9;
    background: var(--ink);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 18px),
      linear-gradient(180deg, #1a2535 0%, #0B1220 100%);
  }
  .photo-meta {
    position: absolute; left: 24px; bottom: 20px;
    color: rgba(244,241,236,0.7);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .photo-meta strong { color: var(--paper); font-weight: 500; display: block; font-size: 13px; margin-bottom: 4px; letter-spacing: 0.04em; }
  .photo-tl {
    position: absolute; right: 24px; top: 20px;
    color: rgba(244,241,236,0.5);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .photo-tag {
    position: absolute; left: 24px; top: 20px;
    background: var(--leaf);
    color: var(--paper);
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 2px;
  }

  /* --- ticker / marquee of capabilities --- */
  .ticker {
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    overflow: hidden;
    background: var(--paper);
    padding: 22px 0;
    margin-top: 60px;
  }
  .ticker-track {
    display: flex; gap: 56px;
    white-space: nowrap;
    animation: tick 60s linear infinite;
    font-family: 'Inter Tight'; font-weight: 600;
    font-size: 22px;
    color: var(--ink);
  }
  .ticker-track span { display: inline-flex; align-items: center; gap: 56px; }
  .ticker-track i {
    font-style: normal;
    width: 8px; height: 8px; background: var(--leaf); border-radius: 50%;
    display: inline-block;
  }
  @keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* --- section header pattern --- */
  section { padding: 100px 0; border-top: 1px solid var(--rule); }
  @media (max-width: 720px) { section { padding: 64px 0; } }
  .sec-head { display: grid; grid-template-columns: 200px 1fr; gap: 48px; margin-bottom: 56px; align-items: start; }
  @media (max-width: 720px) { .sec-head { grid-template-columns: 1fr; gap: 16px; } }
  .sec-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 8px;
  }
  .sec-tag .num { color: var(--ink); font-weight: 500; }
  .sec-title {
    font-family: 'Inter Tight';
    font-size: clamp(36px, 5vw, 64px);
    line-height: 1;
    letter-spacing: -0.025em;
    font-weight: 700;
    margin: 0;
    text-wrap: balance;
  }
  .sec-title em { font-style: italic; font-weight: 400; color: var(--leaf); }
  .sec-title b { color: var(--primary); font-weight: 700; }

  /* --- About --- */
  .about-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 80px; align-items: start; }
  @media (max-width: 980px) { .about-grid { grid-template-columns: 1fr; gap: 40px; } }
  .about-body p { font-size: 17px; line-height: 1.65; max-width: 60ch; color: var(--ink-2); margin: 0 0 1em; }
  .about-body p:first-child::first-letter {
    font-family: 'Inter Tight'; font-weight: 700; font-size: 64px;
    float: left; line-height: 0.85; padding-right: 12px; padding-top: 6px; color: var(--ink);
  }

  .timeline { display: flex; flex-direction: column; gap: 4px; }
  .tl-row {
    display: grid; grid-template-columns: 80px 1fr; gap: 24px;
    padding: 16px 0;
    border-bottom: 1px solid var(--rule);
    align-items: baseline;
  }
  .tl-row:last-child { border-bottom: none; }
  .tl-year { font-family: 'Inter Tight'; font-weight: 700; font-size: 20px; color: var(--primary); letter-spacing: -0.01em; }
  .tl-text { font-size: 15px; color: var(--ink-2); line-height: 1.5; }
  .tl-text strong { color: var(--ink); font-weight: 600; }

  /* --- Services --- */
  .svc-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
  .svc {
    grid-column: span 4;
    background: var(--paper-2);
    padding: 28px;
    border-radius: 8px;
    position: relative;
    transition: background 0.18s, transform 0.18s;
    cursor: pointer;
    min-height: 240px;
    display: flex; flex-direction: column; justify-content: space-between;
    overflow: hidden;
  }
  .svc:hover { background: var(--ink); color: var(--paper); transform: translateY(-3px); }
  .svc:hover .svc-num, .svc:hover .svc-desc { color: rgba(244,241,236,0.65); }
  .svc:hover .svc-arrow { transform: translate(4px, -4px); color: var(--leaf); }
  .svc-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--muted); }
  .svc-name { font-family: 'Inter Tight'; font-size: 26px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.05; margin: 12px 0 16px; }
  .svc-desc { font-size: 13px; color: var(--ink-2); line-height: 1.5; max-width: 32ch; }
  .svc-arrow { position: absolute; top: 24px; right: 24px; font-family: 'Inter Tight'; font-size: 22px; color: var(--ink); transition: transform 0.18s, color 0.18s; }

  .svc.feature {
    grid-column: span 8;
    background: var(--ink);
    color: var(--paper);
    min-height: 380px;
    background-image:
      radial-gradient(ellipse at 80% 20%, rgba(30,90,140,0.4) 0%, transparent 50%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 18px);
  }
  .svc.feature:hover { background: var(--primary-deep); transform: translateY(-3px); }
  .svc.feature .svc-num { color: rgba(244,241,236,0.5); }
  .svc.feature .svc-desc { color: rgba(244,241,236,0.7); max-width: 40ch; font-size: 15px; }
  .svc.feature .svc-name { font-size: 44px; max-width: 14ch; }
  .svc.feature .svc-arrow { color: var(--leaf); }

  .svc.leaf { background: var(--leaf); color: var(--paper); }
  .svc.leaf:hover { background: var(--leaf-deep); }
  .svc.leaf .svc-num { color: rgba(244,241,236,0.6); }
  .svc.leaf .svc-desc { color: rgba(244,241,236,0.8); }
  .svc.leaf .svc-arrow { color: var(--paper); }
  .svc.leaf:hover .svc-num, .svc.leaf:hover .svc-desc { color: rgba(244,241,236,0.85); }

  @media (max-width: 980px) { .svc, .svc.feature { grid-column: span 6; } .svc.feature .svc-name { font-size: 32px; } }
  @media (max-width: 640px) { .svc, .svc.feature { grid-column: span 12; } }

  /* --- Services (categorized list) --- */
  .svc-groups {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  @media (max-width: 880px) { .svc-groups { grid-template-columns: 1fr; } }

  .svc-group {
    background: var(--paper-2);
    border-radius: 10px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .svc-group.feature {
    background: var(--ink);
    color: var(--paper);
    grid-column: span 2;
    background-image:
      radial-gradient(ellipse at 90% 10%, rgba(74,124,89,0.25) 0%, transparent 55%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 18px);
  }
  @media (max-width: 880px) { .svc-group.feature { grid-column: span 1; } }

  .svc-group-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .svc-group.feature .svc-group-head { border-bottom-color: rgba(244,241,236,0.18); }
  .svc-group-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .svc-group.feature .svc-group-id { color: rgba(244,241,236,0.5); }
  .svc-group-name {
    font-family: 'Inter Tight';
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.015em;
    flex: 1;
  }
  .svc-group.feature .svc-group-name { font-size: 36px; }
  .svc-group-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--leaf);
    color: var(--paper);
    padding: 4px 10px;
    border-radius: 999px;
  }

  .svc-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  .svc-item {
    display: grid;
    grid-template-columns: 36px 1fr 24px;
    align-items: center;
    gap: 14px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: padding 0.18s, background 0.18s;
  }
  .svc-group.feature .svc-item { border-bottom-color: rgba(244,241,236,0.12); }
  .svc-item:last-child { border-bottom: none; }
  .svc-item:hover { padding-left: 14px; padding-right: 14px; }
  .svc-item:hover .svc-item-arrow { transform: translateX(4px); color: var(--leaf); }
  .svc-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .svc-group.feature .svc-item-num { color: rgba(244,241,236,0.45); }
  .svc-item-name {
    font-family: 'Inter Tight';
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.25;
  }
  .svc-group.feature .svc-item-name { font-size: 18px; }
  .svc-item-arrow {
    font-family: 'Inter Tight';
    font-size: 18px;
    color: var(--ink);
    transition: transform 0.18s, color 0.18s;
    text-align: right;
  }
  .svc-group.feature .svc-item-arrow { color: rgba(244,241,236,0.7); }
  .britfoam {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 0;
  }
  @media (max-width: 980px) { .britfoam { grid-template-columns: 1fr; } }
  .bf-text { padding: 56px; }
  .bf-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--leaf); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
  .bf-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--leaf); }
  .bf-name { font-family: 'Inter Tight'; font-weight: 700; font-size: clamp(48px, 6vw, 84px); letter-spacing: -0.03em; line-height: 0.95; margin: 0 0 24px; }
  .bf-name sup { font-size: 0.32em; vertical-align: top; color: var(--leaf); margin-left: 6px; }
  .bf-desc { font-size: 17px; line-height: 1.6; color: rgba(244,241,236,0.8); max-width: 50ch; margin: 0 0 32px; }
  .bf-meta { display: flex; flex-direction: column; gap: 14px; padding-top: 24px; border-top: 1px solid rgba(244,241,236,0.15); }
  .bf-meta div { display: flex; gap: 16px; align-items: baseline; }
  .bf-meta .k { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(244,241,236,0.5); width: 110px; flex-shrink: 0; }
  .bf-meta .v { font-size: 14px; color: var(--paper); }

  .bf-visual {
    background: var(--leaf-deep);
    position: relative;
    min-height: 480px;
    background-image:
      radial-gradient(circle at 30% 40%, rgba(255,255,255,0.08) 0%, transparent 30%),
      radial-gradient(circle at 70% 70%, rgba(255,255,255,0.05) 0%, transparent 30%),
      repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,0.025) 0 1px, transparent 1px 12px);
    display: grid; place-items: center;
    padding: 40px;
  }
  .bf-diagram {
    width: 100%; max-width: 360px; aspect-ratio: 1;
    border: 1px dashed rgba(244,241,236,0.4);
    border-radius: 50%;
    position: relative;
    display: grid; place-items: center;
  }
  .bf-diagram::before {
    content: ''; position: absolute; inset: 18%;
    border: 1px dashed rgba(244,241,236,0.3); border-radius: 50%;
  }
  .bf-diagram::after {
    content: ''; position: absolute; inset: 36%;
    background: var(--leaf); border-radius: 50%;
    box-shadow: 0 0 60px rgba(74,124,89,0.6);
  }
  .bf-diagram .bf-label {
    position: absolute; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: rgba(244,241,236,0.7); letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--leaf-deep); padding: 4px 8px;
  }
  .bf-label.t1 { top: -8px; left: 50%; transform: translateX(-50%); }
  .bf-label.t2 { bottom: -8px; left: 50%; transform: translateX(-50%); }
  .bf-label.t3 { top: 50%; left: -8px; transform: translateY(-50%) rotate(-90deg); transform-origin: center; }
  .bf-label.t4 { top: 50%; right: -8px; transform: translateY(-50%) rotate(90deg); transform-origin: center; }

  /* --- Industries --- */
  .ind-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  @media (max-width: 900px) { .ind-grid { grid-template-columns: repeat(2, 1fr); } }
  .ind {
    aspect-ratio: 4/5;
    background: var(--paper-2);
    padding: 24px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: background 0.18s, color 0.18s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .ind:hover { background: var(--primary); color: var(--paper); }
  .ind:hover .ind-num { color: rgba(244,241,236,0.6); }
  .ind:hover .ind-bar { background: var(--paper); }
  .ind-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  .ind-name { font-family: 'Inter Tight'; font-weight: 600; font-size: 24px; letter-spacing: -0.015em; line-height: 1.05; }

  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setShown(true); obs.disconnect(); } }, { threshold: 0.12 });

    return () => obs.disconnect();
  }, []);
  return <div ref={ref} className={'reveal ' + (shown ? 'shown' : '')} style={{ transitionDelay: delay + 'ms' }}>{children}</div>;

// ── Tweaks ──
const TweaksUI = ({ tweaks, setTweak }) => (
  <TweaksPanel title="Tweaks">
    <TweakSection title="Hero">
      <TweakToggle label="Show capability ticker" value={tweaks.showTicker} onChange={v => setTweak('showTicker', v)} />
    </TweakSection>
    <TweakSection title="Accent colour">
      <TweakRadio
        value={tweaks.accent}
        onChange={v => setTweak('accent', v)}
        options={[
          { value: 'leaf', label: 'Moss green' },
          { value: 'blue', label: 'Petrol blue' },
          { value: 'brass', label: 'Brass' },
        ]}
      />
    </TweakSection>
    <TweakSection title="Density">
      <TweakRadio
        value={tweaks.density}
        onChange={v => setTweak('density', v)}
        options={[
          { value: 'comfortable', label: 'Comfortable' },
          { value: 'compact', label: 'Compact' },
        ]}
      />
    </TweakSection>
  </TweaksPanel>
);

// ── App ──
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks via CSS vars
  useEffect(() => {
    const r = document.documentElement;
    if (tweaks.accent === 'leaf') {
      r.style.setProperty('--leaf', '#4A7C59');
      r.style.setProperty('--leaf-deep', '#2F5A3E');
    } else if (tweaks.accent === 'blue') {
      r.style.setProperty('--leaf', '#1E5A8C');
      r.style.setProperty('--leaf-deep', '#0F3D63');
    } else if (tweaks.accent === 'brass') {
      r.style.setProperty('--leaf', '#C8A24A');
      r.style.setProperty('--leaf-deep', '#8C6F2F');
    }
  }, [tweaks.accent]);

  useEffect(() => {
    document.body.style.setProperty('--section-padding', tweaks.density === 'compact' ? '64px' : '100px');
    const sheets = document.querySelectorAll('style');
    // simple approach — toggle a class
    document.documentElement.dataset.density = tweaks.density;
  }, [tweaks.density]);

  return (
    <>
      <TopStrip />
      <Nav />
      <Hero tweaks={tweaks} />
      <About />
      <Services />
      <BritFoam />
      <Industries />
      <Accreditations />
      <Testimonials />
      <Contact />
      <Footer />
      <TweaksUI tweaks={tweaks} setTweak={setTweak} />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
